spring:
  application:
    name: splitso-service
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: 86400000
  mongodb:
    uri: ${DATABASE_URI}

logging:
  level:
    root: info
    com.chsrvn.splitsoservice: debug
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
  logback:
    rollingpolicy:
      max-history: 10
      max-size: 10MB
